<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>marify</title>
</head>

<body class="">

  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Marify</span>
    </div>
  </nav>
  <h1 class="text-center fs-4 mt-3">Bienvenido a marify tu app de música favorita</h1>
  <form class="w-50 mt-3 mx-auto">
    <fieldset>
      <legend class="text-center">Formulario de Registro</legend>
      <div class="mb-3">
        <label for="name" class="form-label">Nombre</label>
        <input type="text" name="name" id="name" class="form-control" aria-describedby="input para el nombre">
      </div>
      <div class="mb-3">
        <label for="lastName" class="form-label">Apellido</label>
        <input name="lastName" id="lastName" type="text" class="form-control">
      </div>
      <div class="mb-3">
        <label for="" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control">
      </div>
      <div class="mb-3">
        <label for="" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control">
      </div>
      <button class="btn btn-primary w-100" type="submit">Registrarse</button>
    </fieldset>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
